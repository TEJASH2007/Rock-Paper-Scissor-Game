<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>
        Rock Paper And Scissor
    </h1>

    <div id="container">
        <div class="heading" id="two">
            <div style="color:blue">Rock</div>
            <div class="content">
                <i class="fa-solid fa-hand-back-fist"></i>
            </div>
        </div>

        <div class="heading" id="three">
            <div style="color:blue">Paper</div>
            <div class="content">
                <i class="fa-solid fa-hand"></i>
            </div>
        </div>

        <div class="heading" id="one">
            <div style="color:blue">Scissor</div>
            <div class="content">
                <i class="fa-solid fa-hand-scissors"></i>
            </div>
        </div>
    </div>

    <div id="score">
        <div class="text">
            <div class="heading">
                <div style="color:blue">Computer</div>
                <div class="content" id="computer">
                    <i class=""></i>
                </div>
            </div>
        </div>

        <div class="text">
            <div class="heading">
                <div style="color:blue">UserScore</div>
                <div class="content" id="userScore">0</div>
            </div>
        </div>

        <div class="text">
            <div class="heading">
                <div style="color:blue">ComputerScore</div>
                <div class="content" id="AIScore">0</div>
            </div>
        </div>

        <h1 id="res"></h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
